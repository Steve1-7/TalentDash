name: Deploy Supabase Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: |
          # Download the latest Supabase CLI binary for Linux x86_64 and install
          echo "Downloading Supabase CLI..."
          curl -L "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/supabase.tar.gz
          supabase --version

      - name: Supabase login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase project
        run: supabase link --project-ref ryqsqwjycnrfiikglbnr

      - name: Set Supabase secrets (optional)
        run: |
          if [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            supabase secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project-ref ryqsqwjycnrfiikglbnr
          else
            echo "SUPABASE_SERVICE_ROLE_KEY not provided; skipping setting project secret."
          fi

      - name: Deploy profiles function
        working-directory: backend-supabase
        run: supabase functions deploy profiles --project-ref ryqsqwjycnrfiikglbnr

      - name: Deploy gigs function
        working-directory: backend-supabase
        run: supabase functions deploy gigs --project-ref ryqsqwjycnrfiikglbnr
