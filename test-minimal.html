<!DOCTYPE html>
<html>
<head>
    <title>Minimal Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .test {
            padding: 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="test">
        <h1>Minimal Test Page</h1>
        <p>If you can see this, the browser is working.</p>
        <p>Check browser console (F12) for JavaScript errors.</p>
        <p>Current URL: <span id="url"></span></p>
    </div>
    
    <script>
        document.getElementById('url').textContent = window.location.href;
        console.log('Minimal test page loaded successfully');
    </script>
</body>
</html>
